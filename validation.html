<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lovender — Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:       #12284B;
      --lav:        #BFB6CE;
      --lav-light:  #D4CEDF;
      --lav-pale:   #EDE8F4;
      --lav-softer: #F3F0F8;
      --sage:       #406D61;
      --sage-light: #6B9B8E;
      --cream:      #FAF7F2;
      --text:       #2c2840;
      --muted:      #7a7090;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; }

    /* ── FULL SCENE ── */
    .scene {
      width: 100vw; height: 100vh;
      position: relative; overflow: hidden;
      background: linear-gradient(170deg, #ddd7ec 0%, #c5bdda 25%, #aec4bb 55%, #7ea99a 100%);
    }

    /* floating pollen */
    .pollen {
      position: absolute; border-radius: 50%;
      background: var(--lav); pointer-events: none;
      animation: float ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0); opacity: .6; }
      50%      { transform: translateY(-28px) rotate(180deg); opacity: .95; }
    }

    /* ── LAVENDER FIELD (bottom) ── */
    .field-svg {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 55%;
      pointer-events: none;
    }

    /* ── ISLAND ── */
    .island-wrap {
      position: absolute; bottom: 38%; left: 50%;
      transform: translateX(-50%);
      animation: islandRise 1.6s cubic-bezier(.22,1,.36,1) both;
      z-index: 5;
    }
    @keyframes islandRise {
      from { opacity:0; transform:translateX(-50%) translateY(30px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }

    /* ── WELCOME CARD ── */
    .card {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: 90%; max-width: 480px;
      background: rgba(250,247,242,0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(191,182,206,0.45);
      border-radius: 16px;
      padding: 44px 48px 40px;
      text-align: center;
      box-shadow: 0 32px 64px rgba(18,40,75,0.12), 0 6px 16px rgba(18,40,75,0.06);
      animation: cardIn 1.1s cubic-bezier(.22,1,.36,1) .5s both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translate(-50%,-44%) scale(.97); }
      to   { opacity:1; transform:translate(-50%,-50%) scale(1); }
    }

    /* animated lavender sprig check */
    .sprig-check { width: 70px; margin: 0 auto 20px; display:block; }

    .check-circle {
      stroke: var(--sage); stroke-width: 1.5; fill: none;
      stroke-dasharray: 220; stroke-dashoffset: 220;
      animation: drawCircle .9s ease 1.2s forwards;
    }
    .check-tick {
      stroke: var(--sage); stroke-width: 2; fill: none;
      stroke-dasharray: 40; stroke-dashoffset: 40; stroke-linecap: round;
      animation: drawTick .4s ease 2.1s forwards;
    }
    @keyframes drawCircle { to { stroke-dashoffset: 0; } }
    @keyframes drawTick   { to { stroke-dashoffset: 0; } }

    /* lavender sprig on card top */
    .card-sprigs {
      display: flex; justify-content: center; gap: 12px;
      margin-bottom: 18px; opacity: 0;
      animation: fadeIn .8s ease 2.6s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--lav-softer); border: 1px solid var(--lav-light);
      border-radius: 20px; padding: 4px 14px 4px 8px; margin-bottom: 14px;
    }
    .badge svg { width: 13px; }
    .badge span { font-size: 9px; font-weight: 500; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }

    .card h1 {
      font-family: 'Playfair Display', serif; font-weight: 400; font-size: 38px;
      line-height: 1.15; color: var(--navy); margin-bottom: 10px;
    }
    .card h1 em { font-style: italic; color: var(--muted); }

    .card p.sub {
      font-size: 13px; font-weight: 300; color: var(--muted);
      line-height: 1.75; margin-bottom: 26px; max-width: 330px; margin-left: auto; margin-right: auto;
    }

    /* lavender divider */
    .lav-divider {
      display: flex; align-items: center; gap: 10px; margin: 0 auto 24px; max-width: 260px;
    }
    .lav-divider::before, .lav-divider::after { content:''; flex:1; height:1px; background:rgba(191,182,206,0.6); }

    /* info tiles */
    .tiles { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(191,182,206,0.3); border-radius:10px; overflow:hidden; margin-bottom:24px; border:1px solid rgba(191,182,206,0.3); }
    .tile { background:rgba(250,247,242,0.9); padding:14px 16px; text-align:left; }
    .tile .t-label { font-size:8.5px; font-weight:500; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .tile .t-val { font-family:'Playfair Display',serif; font-size:15px; font-weight:400; color:var(--navy); }

    /* buttons */
    .btn-row { display:flex; gap:10px; }
    .btn-p {
      flex:1; padding:13px; border-radius:9px; background:var(--sage); color:#fff; border:none; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:500; letter-spacing:.06em; text-decoration:none;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 14px rgba(64,109,97,.28);
      transition:background .3s,transform .2s;
    }
    .btn-p:hover { background:#34574d; transform:translateY(-1px); }
    .btn-o {
      flex:1; padding:13px; border-radius:9px; background:transparent; color:var(--navy);
      border:1.5px solid rgba(191,182,206,0.7); cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:12.5px; font-weight:400; letter-spacing:.06em; text-decoration:none;
      display:flex; align-items:center; justify-content:center;
      transition:border-color .3s,color .3s,transform .2s;
    }
    .btn-o:hover { border-color:var(--sage); color:var(--sage); transform:translateY(-1px); }

    /* logo */
    .logo-top {
      position: fixed; top: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex; align-items: center; gap: 9px;
      animation: fadeDown .7s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateX(-50%) translateY(-14px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    .logo-top svg { width:24px; fill:var(--navy); opacity:.85; }
    .logo-top span { font-family:'Playfair Display',serif; font-size:18px; font-weight:400; letter-spacing:.14em; color:var(--navy); }
  </style>
</head>
